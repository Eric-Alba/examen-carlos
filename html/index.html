<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entorno Multimedia Docker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #2c3e50; color: white; padding: 20px; }
        .card { background: #ecf0f1; color: #333; margin: 0 auto; padding: 30px; width: 70%; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.3); }
        img { max-width: 400px; border: 5px solid #bdc3c7; border-radius: 10px; margin: 15px 0; }
        video { width: 100%; max-width: 640px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        h1 { color: #2980b9; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Infraestructura Multimedia Lista</h1>
        <p>Contenido servido desde <strong>volumen compartido</strong> entre dos backends.</p>
        
        <h3>Imagen: Hola.png</h3>
        <img src="Hola.png" alt="Imagen cargada desde el volumen">
        
        <h3>Video: videoplayback.mp4</h3>
        <video controls>
            <source src="videoplayback.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de video.
        </video>
    </div>
</body>
</html>
