services:
  proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - red_interna
    depends_on:
      - web1
      - web2

  web1:
    image: nginx:latest
    networks:
      - red_interna
    volumes:
      - ./html:/usr/share/nginx/html:ro

  web2:
    image: nginx:latest
    networks:
      - red_interna
    volumes:
      - ./html:/usr/share/nginx/html:ro

networks:
  red_interna:
    driver: bridge
